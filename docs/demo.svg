<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-label="InvariantEval gate: good run passes, regressed run blocked">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1419"/>
      <stop offset="100%" stop-color="#1a2332"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="960" height="420" fill="url(#bg)" rx="12"/>
  <text x="480" y="52" text-anchor="middle" fill="#e7ecf3" font-family="system-ui,Segoe UI,sans-serif" font-size="28" font-weight="700">InvariantEval</text>
  <text x="480" y="78" text-anchor="middle" fill="#9db4d0" font-family="system-ui,Segoe UI,sans-serif" font-size="14">Safety-invariant eval gate</text>

  <g filter="url(#shadow)">
    <rect x="40" y="110" width="420" height="260" rx="10" fill="#14201a" stroke="#2d6a4f" stroke-width="2"/>
    <text x="250" y="145" text-anchor="middle" fill="#51cf66" font-family="ui-monospace,Consolas,monospace" font-size="16" font-weight="700">GOOD RUN  PASS</text>
    <text x="60" y="185" fill="#a8d5ba" font-family="ui-monospace,Consolas,monospace" font-size="13">panel-001</text>
    <text x="60" y="215" fill="#c8e6d0" font-family="ui-monospace,Consolas,monospace" font-size="12">pass_fail_result: (absent)</text>
    <text x="60" y="245" fill="#c8e6d0" font-family="ui-monospace,Consolas,monospace" font-size="12">device_status: human_entered</text>
    <text x="60" y="290" fill="#51cf66" font-family="ui-monospace,Consolas,monospace" font-size="13">invariant failures: 0</text>
    <text x="60" y="320" fill="#51cf66" font-family="ui-monospace,Consolas,monospace" font-size="13">exit code: 0</text>
    <circle cx="400" cy="145" r="14" fill="#51cf66"/>
    <path d="M393 145 L398 150 L408 138" stroke="#0f1419" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="500" y="110" width="420" height="260" rx="10" fill="#201418" stroke="#9b2226" stroke-width="2"/>
    <text x="710" y="145" text-anchor="middle" fill="#ff6b6b" font-family="ui-monospace,Consolas,monospace" font-size="16" font-weight="700">REGRESSED  BLOCKED</text>
    <text x="520" y="185" fill="#f4a6a6" font-family="ui-monospace,Consolas,monospace" font-size="13">panel-001</text>
    <text x="520" y="215" fill="#ffc9c9" font-family="ui-monospace,Consolas,monospace" font-size="12">pass_fail_result: "pass" É model</text>
    <text x="520" y="245" fill="#ffc9c9" font-family="ui-monospace,Consolas,monospace" font-size="12">never_auto_filled: FAIL</text>
    <text x="520" y="290" fill="#ff6b6b" font-family="ui-monospace,Consolas,monospace" font-size="13">invariant failures: 1</text>
    <text x="520" y="320" fill="#ff6b6b" font-family="ui-monospace,Consolas,monospace" font-size="13">exit code: 1</text>
    <circle cx="860" cy="145" r="14" fill="#ff6b6b"/>
    <path d="M854 139 L866 151 M866 139 L854 151" stroke="#0f1419" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <text x="480" y="400" text-anchor="middle" fill="#6b7c93" font-family="system-ui,Segoe UI,sans-serif" font-size="12">fixture replay Ę deterministic Ę no GPU</text>
</svg>
